<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Women's Day 🌸</title>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:linear-gradient(135deg,#ffd6e7,#efe1ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow-x:hidden;
padding:20px;
}

/* PAGE */

.page{
display:none;
width:100%;
max-width:600px;
}

.active{
display:block;
animation:fadeIn 1s;
}

/* TEXT */

h1{
font-size:38px;
}

h2{
font-size:30px;
}

p{
font-size:20px;
}

/* IMAGE */

img{
width:80%;
max-width:300px;
height:auto;
margin:20px auto;
display:block;
border-radius:15px;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff6fa5;
color:white;
font-size:18px;
cursor:pointer;
margin:15px auto;
display:block;
}

button:hover{
background:#ff3f8e;
}

/* LETTER */

.letter{
background:#faebd7;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#typewriter{
font-size:20px;
line-height:1.6;
color:#8B4513;
font-family:cursive;
}

/* NO IMAGE */

#noimg{
display:none;
width:70%;
max-width:250px;
margin:auto;
margin-top:15px;
}

/* CONFETTI */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}
/* Floating flowers */

.flowers span{
position:absolute;
font-size:25px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>
    <div class="flowers"></div>

<audio autoplay loop muted id="bgmusic">
<source src="images/perfecto.mpeg" type="audio/mpeg">
</audio>
        
<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>💐Happiest Women's Day💐</h1>

<p>A small surprise is waiting for you...</p>

<img src="images/cat1.webp" style="height: 300px;">

<button onclick="playMusic();nextPage('page2')">Click here to continue, Miss Eye Roller 🙄🙄</button>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<h2>I have something for you 👀</h2>

<p>Do you want to see it???..</p>

<button onclick="startLetter()">Yes 😃</button>

<p>OR</p>

<button onclick="noClick()">No 🙃</button>

<p id="nomsg"></p>

<img id="noimg" src="images/darecat.webp">

</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

<div class="letter">

<h2>A Letter For You 📜</h2>

<p id="typewriter"></p>

<button onclick="restart()">Replay 🔄</button>

</div>

</div>

<canvas id="confetti"></canvas>

<script>
    function playMusic(){
    document.getElementById("bgmusic").muted = false;
    document.getElementById("bgmusic").play();

}

function nextPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")



}

/* NO BUTTON */

function noClick(){

document.getElementById("nomsg").innerText =
"Nice try 😏 but today you must click YES! (CHAL re, How dare you??..LOL)"

document.getElementById("noimg").style.display="block"

}

/* LETTER PAGE */

function startLetter(){

nextPage("page3")

typeWriter()

}

/* TYPEWRITER */

const text = `Dear Mademoiselle,,
 Happiest Women's Day! On this day and every day, you deserve to be celebrated and uplifted..Maybe it's a tough time for you rn, 
 but just remember, your strength isn't defined by your struggles, it's defined by how you rise above them!!(Just to remind) There is nothing impossible in 
 this world for a woman 'cause she is born with the dedication to make everything possible..!! 
Keep shining, keep pushing, and know that you're worthy of every bit of love and success coming your way! 
(And as always)Use your spectacles more, eat healthy and sleep well!
Cheers, proud of Yaa!!....
`

let i = 0

function typeWriter(){

if(i < text.length){

document.getElementById("typewriter").innerHTML += text.charAt(i)

i++

setTimeout(typeWriter,40)

}

}
/* FLOWERS */

const flowers = document.querySelector(".flowers")

for(let i=0;i<20;i++){

let flower = document.createElement("span")

flower.innerHTML = "🌹"

flower.style.left = Math.random()*100 + "vw"

flower.style.animationDuration = (5 + Math.random()*10) + "s"

flowers.appendChild(flower)

}
/* RESTART */

function restart(){
location.reload()
}

</script>

</body>
</html>
